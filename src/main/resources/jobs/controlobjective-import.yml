# =============================================================================
# CONTROL OBJECTIVE IMPORT - Plantilla
# =============================================================================
# Duplicar este fichero por cada país, cambiando:
#   - name: controlobjective-import-XX (código del país)
#   - source.location.path: /data/Control Objective-XX.xlsx
# =============================================================================
name: controlobjective-import
description: Import control objective data from Excel file (template - duplicate per country)
enabled: true
fileType: EXCEL
batchSize: 500

source:
  type: RESOURCES
  location:
    path: /data/Control Objective-XX.xlsx

parameters:
  schema: INGESTA

tasks:
  # ---------------------------------------------------------------------------
  # TAREA 1 – TRANSFORMACIÓN DE DATOS
  # ---------------------------------------------------------------------------
  - name: clean-data
    order: 1
    type: TRANSFORMATION
    stopOnFailure: true
    subtasks:
      - name: trim-whitespace
        order: 1
        type: TRIM

      - name: build-id
        order: 2
        type: CONCATENATE
        parameters:
          sourceColumns: ["Folder_Path", "Identifier"]
          targetColumn: "ID"
          separator: "/"

  # ---------------------------------------------------------------------------
  # TAREA 2 – PERSISTENCIA EN BASE DE DATOS
  # ---------------------------------------------------------------------------
  - name: persist-data
    order: 2
    type: PERSISTENCE
    stopOnFailure: true
    subtasks:
      # Borrar datos del día actual en CONTROLOBJECTIVE antes de reinsertar
      - name: truncate-controlobjective
        order: 1
        type: TRUNCATE
        parameters:
          tableName: CONTROLOBJECTIVE
          timestampColumn: TIMESTAMP

      # Validar Control_Objective_Owner contra tabla HR
      - name: validate-control-objective-owner
        order: 2
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Control_Objective_Owner
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Control objective

      # Validar Delegate_Control_Objective_Owner contra tabla HR
      - name: validate-delegate-control-objective-owner
        order: 3
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Delegate_Control_Objective_Owner
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Control objective

      # Validar Sign_off_by contra tabla HR
      - name: validate-sign-off-by
        order: 4
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Sign_off_by
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Control objective

      # Insertar en tabla CONTROLOBJECTIVE
      - name: insert-controlobjective
        order: 5
        type: INSERT
        parameters:
          tableName: CONTROLOBJECTIVE
          autoMap: true
          mappings:
            - dbColumn: "ID"
              concatenate: ["Folder_Path", "Identifier"]
              separator: "/"
            - dbColumn: "TIMESTAMP"
              autoGenerate: "TIMESTAMP"
            - excelColumn: "Control_Objective_Name"
              dbColumn: "NAME"
            - excelColumn: "Control_Objective_Description"
              dbColumn: "DESCRIPTION"

      # Relación condicional: si Parent_Object_Types == "SOXRisk"
      # → verificar en RISK → insertar en CONTROLOBJECTIVE_RISK
      - name: link-parent-risk
        order: 6
        type: LINK_PARENT
        parameters:
          idColumn: ID
          parentPathColumn: Parent_Path
          parentObjectsColumn: Parent_Objects
          parentTypeColumn: Parent_Object_Types
          separator: "/"
          etlLogTable: ETL_LOG
          currentEntityType: Control objective
          rules:
            - parentType: SOXRisk
              checkTable: RISK
              relationTable: CONTROLOBJECTIVE_RISK
              parentEntityType: Risk
