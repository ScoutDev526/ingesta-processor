# =============================================================================
# TEST RESULT IMPORT - Plantilla
# =============================================================================
# Duplicar este fichero por cada país, cambiando:
#   - name: testresult-import-XX (código del país)
#   - source.location.path: /data/Test Result-XX.xlsx
# =============================================================================
name: testresult-import
description: Import test result data from Excel file (template - duplicate per country)
enabled: true
fileType: EXCEL
batchSize: 500

source:
  type: RESOURCES
  location:
    path: /data/Test Result-XX.xlsx

parameters:
  schema: INGESTA

tasks:
  # ---------------------------------------------------------------------------
  # TAREA 1 – TRANSFORMACIÓN DE DATOS
  # ---------------------------------------------------------------------------
  - name: clean-data
    order: 1
    type: TRANSFORMATION
    stopOnFailure: true
    subtasks:
      - name: trim-whitespace
        order: 1
        type: TRIM

      - name: build-id
        order: 2
        type: CONCATENATE
        parameters:
          sourceColumns: ["Folder_Path", "Identifier"]
          targetColumn: "ID"
          separator: "/"

  # ---------------------------------------------------------------------------
  # TAREA 2 – PERSISTENCIA EN BASE DE DATOS
  # ---------------------------------------------------------------------------
  - name: persist-data
    order: 2
    type: PERSISTENCE
    stopOnFailure: true
    subtasks:
      # Borrar datos del día actual en TESTRESULT antes de reinsertar
      - name: truncate-testresult
        order: 1
        type: TRUNCATE
        parameters:
          tableName: TESTRESULT
          timestampColumn: TIMESTAMP

      # Validar Test_performed_by contra tabla HR
      - name: validate-test-performed-by
        order: 2
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Test_performed_by
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Test result

      # Validar Test_Result_evaluated_by contra tabla HR
      - name: validate-test-result-evaluated-by
        order: 3
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Test_Result_evaluated_by
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Test result

      # Insertar en tabla TESTRESULT
      - name: insert-testresult
        order: 4
        type: INSERT
        parameters:
          tableName: TESTRESULT
          autoMap: true
          mappings:
            - dbColumn: "ID"
              concatenate: ["Folder_Path", "Identifier"]
              separator: "/"
            - dbColumn: "TIMESTAMP"
              autoGenerate: "TIMESTAMP"

      # Relación condicional: si Parent_Object_Types == "SOXTest"
      # → verificar en TESTPLAN → insertar en TESTRESULT_TESTPLAN
      - name: link-parent-testplan
        order: 5
        type: LINK_PARENT
        parameters:
          idColumn: ID
          parentPathColumn: Parent_Path
          parentObjectsColumn: Parent_Objects
          parentTypeColumn: Parent_Object_Types
          separator: "/"
          etlLogTable: ETL_LOG
          currentEntityType: Test result
          rules:
            - parentType: SOXTest
              checkTable: TESTPLAN
              relationTable: TESTRESULT_TESTPLAN
              parentEntityType: Test plan
