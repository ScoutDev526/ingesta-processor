# =============================================================================
# ACTION IMPORT - Plantilla
# =============================================================================
# Duplicar este fichero por cada país, cambiando:
#   - name: action-import-XX (código del país)
#   - source.location.path: Action-XX
# =============================================================================
name: action-import
description: Import action data from Excel file (template - duplicate per country)
enabled: true
fileType: EXCEL
batchSize: 500

source:
  type: RESOURCES
  location:
    path: Action-XX

parameters:
  schema: INGESTA

tasks:
  # ---------------------------------------------------------------------------
  # TAREA 1 – TRANSFORMACIÓN DE DATOS
  # ---------------------------------------------------------------------------
  - name: clean-data
    order: 1
    type: TRANSFORMATION
    stopOnFailure: true
    subtasks:
      - name: trim-whitespace
        order: 1
        type: TRIM

      - name: build-id
        order: 2
        type: CONCATENATE
        parameters:
          sourceColumns: ["Folder_Path", "Identifier"]
          targetColumn: "ID"
          separator: "/"

  # ---------------------------------------------------------------------------
  # TAREA 2 – PERSISTENCIA EN BASE DE DATOS
  # ---------------------------------------------------------------------------
  - name: persist-data
    order: 2
    type: PERSISTENCE
    stopOnFailure: true
    subtasks:
      # Borrar datos del día actual en ACTION antes de reinsertar
      - name: truncate-action
        order: 1
        type: TRUNCATE
        parameters:
          tableName: ACTION
          timestampColumn: TIMESTAMP

      # Validar Action_Owner contra tabla HR
      - name: validate-action-owner
        order: 2
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Action_Owner
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Action

      # Validar Delegate_Action_Owner contra tabla HR
      - name: validate-delegate-action-owner
        order: 3
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Delegate_Action_Owner
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Action

      # Insertar en tabla ACTION
      - name: insert-action
        order: 4
        type: INSERT
        parameters:
          tableName: ACTION
          autoMap: true
          mappings:
            - dbColumn: "ID"
              concatenate: ["Folder_Path", "Identifier"]
              separator: "/"
            - dbColumn: "TIMESTAMP"
              autoGenerate: "TIMESTAMP"
            - excelColumn: "Action_Name"
              dbColumn: "NAME"
            - excelColumn: "Action_Description"
              dbColumn: "DESCRIPTION"

      # Relación condicional: si Parent_Object_Types == "SOXIssue"
      # → verificar en ISSUES → insertar en ACTION_ISSUES
      - name: link-parent
        order: 5
        type: LINK_PARENT
        parameters:
          idColumn: ID
          parentPathColumn: Parent_Path
          parentObjectsColumn: Parent_Objects
          parentTypeColumn: Parent_Object_Types
          separator: "/"
          etlLogTable: ETL_LOG
          currentEntityType: Action
          rules:
            - parentType: SOXIssue
              checkTable: ISSUES
              relationTable: ACTION_ISSUES
              parentEntityType: Issue
