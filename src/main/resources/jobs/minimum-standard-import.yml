# =============================================================================
# MINIMUM STANDARD IMPORT - Plantilla
# =============================================================================
# Duplicar este fichero por cada país, cambiando:
#   - name: minimum-standard-import-XX (código del país)
#   - source.location.path: Minimum Standard-XX
# =============================================================================
name: minimum-standard-import
description: Import minimum standard data from Excel file (template - duplicate per country)
enabled: true
fileType: EXCEL
batchSize: 500

source:
  type: RESOURCES
  location:
    path: Minimum Standard-XX

parameters:
  schema: INGESTA

tasks:
  # ---------------------------------------------------------------------------
  # TAREA 1 – TRANSFORMACIÓN DE DATOS
  # ---------------------------------------------------------------------------
  - name: clean-data
    order: 1
    type: TRANSFORMATION
    stopOnFailure: true
    subtasks:
      - name: trim-whitespace
        order: 1
        type: TRIM

      - name: build-id
        order: 2
        type: CONCATENATE
        parameters:
          sourceColumns: ["Folder_Path", "Identifier"]
          targetColumn: "ID"
          separator: "/"

  # ---------------------------------------------------------------------------
  # TAREA 2 – PERSISTENCIA EN BASE DE DATOS
  # ---------------------------------------------------------------------------
  - name: persist-data
    order: 2
    type: PERSISTENCE
    stopOnFailure: true
    subtasks:
      # Borrar datos del día actual en MINIMUMSTANDARD antes de reinsertar
      - name: truncate-minimumstandard
        order: 1
        type: TRUNCATE
        parameters:
          tableName: MINIMUMSTANDARD
          timestampColumn: TIMESTAMP

      # Validar Domain_Owner contra tabla HR
      - name: validate-domain-owner
        order: 2
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: Domain_Owner
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Minimum standard

      # Validar SPOC contra tabla HR
      - name: validate-spoc
        order: 3
        type: VALIDATE_REFERENCE
        parameters:
          fieldColumn: SPOC
          referenceTable: HR
          referenceIdColumn: ID
          timestampColumn: TIMESTAMP
          idColumn: ID
          etlLogTable: ETL_LOG
          currentEntityType: Minimum standard

      # Insertar en tabla MINIMUMSTANDARD
      - name: insert-minimumstandard
        order: 4
        type: INSERT
        parameters:
          tableName: MINIMUMSTANDARD
          autoMap: true
          mappings:
            - dbColumn: "ID"
              concatenate: ["Folder_Path", "Identifier"]
              separator: "/"
            - dbColumn: "TIMESTAMP"
              autoGenerate: "TIMESTAMP"
            - excelColumn: "Minimum_Standard_Name"
              dbColumn: "NAME"
            - excelColumn: "Minimum_Standard_Description"
              dbColumn: "DESCRIPTION"

      # Relación condicional: si Parent_Object_Types == "Submandate"
      # → verificar en POLICY → insertar en MINIMUMSTANDARD_POLICY
      - name: link-parent-policy
        order: 5
        type: LINK_PARENT
        parameters:
          idColumn: ID
          parentPathColumn: Parent_Path
          parentObjectsColumn: Parent_Objects
          parentTypeColumn: Parent_Object_Types
          separator: "/"
          etlLogTable: ETL_LOG
          currentEntityType: Minimum standard
          rules:
            - parentType: Submandate
              checkTable: POLICY
              relationTable: MINIMUMSTANDARD_POLICY
              parentEntityType: Policy
