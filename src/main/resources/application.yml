spring:
  application:
    name: ingesta-processor
  datasource:
    url: jdbc:h2:mem:ingestadb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  ldap:
    urls: ${LDAP_URL:ldap://ad.ing.net:389}
    base: DC=ad,DC=ing,DC=net
    username: ${LDAP_USER:}
    password: ${LDAP_PASSWORD:}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
ingesta:
  jobs:
    path: classpath:jobs
  data-directory: ""
  working-directory: /tmp/ingesta
  parallel-jobs: 1
  scheduler:
    enabled: false
    cron: "0 0 2 * * ?"
  notification:
    enabled: true

logging:
  level:
    es.ing.icenterprise.arthur: INFO
